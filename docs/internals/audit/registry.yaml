# docs/internals/audit/registry.yaml
# Single source of truth for audit unit metadata.
# FRESHNESS.md, index.md, and SUPERSET-TEMPLATE.md must be kept in sync with this file.
# Total unit count appears in all three — if it changes, all update in the same commit.
# No CI check enforces this today; consistency is verified manually during audits.
#
# Schema:
#   id:                   Stable hyphenated identifier. Used in paths, anchors, scripts, CI.
#   source_artifacts:     Files/dirs mapped to this unit. Each has path + mode (literal|directory).
#   type_primary:         One of: security-rule, llm-agent, llm-facing-tool, review-pipeline,
#                         data-model, infrastructure
#   subprofile_primary:   For infrastructure only: config, state, or boundary. Null otherwise.
#   type_secondary:       Optional second type. Secondary checklist items are fully gate-bearing.
#   subprofile_secondary: For infrastructure secondary only. Null otherwise.
#   phase:                Dependency-ordered audit phase (0-4).
#   boundaries:           Trust boundary IDs (TB-1..TB-9) where this unit contains anchor functions
#                         (responsible for boundary behavior, not merely a consumer).

# ── Phase 0: Leaf (4 units) ────────────────────────────────────────────────

units:
