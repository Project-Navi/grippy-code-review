# ──────────────────────────────────────────────
# Edit these lines for your project
# ──────────────────────────────────────────────
[project]
name = "grippy-code-review"
site_name = "grippy-code-review"
description = "AI-powered PR review agent with security rule engine"
site_url = "https://project-navi.github.io/grippy-code-review"
repo_url = "https://github.com/Project-Navi/grippy-code-review"
repo_name = "Project-Navi/grippy-code-review"
copyright = "Copyright 2025-2026 Nelson Spence"
extra_css = ["stylesheets/navi.css"]

# ──────────────────────────────────────────────
# Edit nav to match your docs structure
# ──────────────────────────────────────────────
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Quickstart" = "getting-started/quickstart.md"},
  ]},
  {"How-To Guides" = [
    {"Configuration" = "how-to/configuration.md"},
    {"Suppression" = "how-to/suppression.md"},
    {"Review Modes" = "how-to/review-modes.md"},
    {"Self-Hosted LLM Guide" = "how-to/self-hosted-llm-guide.md"},
    {"Contributing" = "how-to/contributing.md"},
  ]},
  {"Explanation" = [
    {"Architecture" = "explanation/architecture.md"},
    {"Security Model" = "explanation/security-model.md"},
    {"Knowledge Graph" = "explanation/knowledge-graph.md"},
  ]},
  {"Reference" = [
    {"Scoring Rubric" = "reference/scoring-rubric.md"},
    {"Changelog" = "reference/changelog.md"},
  ]},
]

# ──────────────────────────────────────────────
# Everything below is shared brand config
# You should not need to change these
# ──────────────────────────────────────────────
[project.theme]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"

[project.theme.features]
navigation_sections = true
navigation_expand = true
navigation_top = true
content_code_copy = true
toc_integrate = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.plugins.search]
