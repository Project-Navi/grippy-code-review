name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 6 * * 1"  # Monday 06:15 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    uses: Project-Navi/.github/.github/workflows/scorecard.yml@83f5a6860e88af77ecebda9d90836c6e7caec159
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    secrets: inherit

  badge:
    name: Update scorecard badge
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run Scorecard (JSON for badge)
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          results_file: results.json
          results_format: json
          publish_results: false

      - name: Generate scorecard badge
        run: |
          SCORE=$(python3 -c "import json; print(json.load(open('results.json'))['score'])")
          if python3 -c "exit(0 if float('$SCORE') >= 7.0 else 1)"; then COLOR="brightgreen";
          elif python3 -c "exit(0 if float('$SCORE') >= 5.0 else 1)"; then COLOR="green";
          elif python3 -c "exit(0 if float('$SCORE') >= 3.0 else 1)"; then COLOR="yellowgreen";
          else COLOR="red"; fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/openssf_scorecard-${SCORE}-${COLOR}" > .github/badges/scorecard.svg
          echo "" >> .github/badges/scorecard.svg

      - name: Commit scorecard badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/scorecard.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update scorecard badge [skip ci]"
          git push || echo "::warning::Push blocked by branch protection — badge update skipped"
