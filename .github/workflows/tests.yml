name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ── Test matrix (NOT a required check) ──────────────────────────────
  test-run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          EXTRA_ARGS: ${{ matrix.python-version == '3.12' && '--cov-report=xml --junitxml=test-results.xml' || '' }}
        run: |
          uv run pytest tests/ -v \
            --cov=src/grippy \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            $EXTRA_ARGS

      - name: Upload test artifacts
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-metrics
          path: |
            coverage.xml
            test-results.xml
          retention-days: 5

      - name: Upload to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  # ── Required check: test (aggregator) ───────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  test:
    needs: test-run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.test-run.result }}" != "success" ]; then
            echo "::error::Test matrix failed"
            exit 1
          fi

  # ── Required check: lint ────────────────────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/grippy/ tests/

      - name: Format check
        run: uv run ruff format --check src/grippy/ tests/

  # ── Required check: typecheck ───────────────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run mypy src/grippy/

  # ── Required check: security ────────────────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src/grippy/

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit --desc --output=pip-audit-report.json --format=json --skip-editable

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # ── Required check: semgrep ─────────────────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  # NOTE: no 'name:' override — check name = job key 'semgrep'
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: pipx install semgrep==1.153.1

      - name: Run semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            src/

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          sarif_file: semgrep-results.sarif

  # ── Required check: quality-gate ────────────────────────────────────
  # CONTRACT: org ruleset requires this exact check name
  quality-gate:
    needs: test-run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download test metrics
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: test-metrics

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check quality gate
        run: uv run python scripts/quality_gate.py check

  # ── Non-required: bump quality gate (main only) ─────────────────────
  quality-gate-bump:
    name: Bump quality gate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: test-run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download test metrics
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: test-metrics

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Bump quality gate
        run: uv run python scripts/quality_gate.py update

      - name: Generate coverage badge
        run: |
          COV=$(uv run python -c "
          import defusedxml.ElementTree as DET
          t = DET.parse('coverage.xml')
          print(int(float(t.getroot().attrib['line-rate']) * 100))
          ")
          if [ "$COV" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COV" -ge 80 ]; then COLOR="green";
          elif [ "$COV" -ge 70 ]; then COLOR="yellowgreen";
          else COLOR="red"; fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${COV}%25-${COLOR}" > .github/badges/coverage.svg
          echo "" >> .github/badges/coverage.svg

      - name: Commit gate + badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/quality-gate.json .github/badges/coverage.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update quality gate and coverage badge [skip ci]"
          git push || echo "::warning::Push blocked by branch protection — badge update skipped"

  # ── Non-required: test file parity ──────────────────────────────────
  test-file-parity:
    name: Test file parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Check test parity
        run: python scripts/check_test_parity.py check

  # ── Non-required: thread safety scan ────────────────────────────────
  thread-safety:
    name: Thread safety scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check for unprotected module-level mutables
        run: |
          echo "Scanning for module-level mutable globals without Lock protection..."
          FOUND=0
          for f in src/grippy/*.py; do
            # Match top-level dict/list assignments (no leading whitespace)
            if grep -Pn '^[A-Z_]+\s*[:=].*\b(dict|list|\{\}|\[\])\b' "$f" 2>/dev/null; then
              # Check if the same file has a Lock import/usage
              if ! grep -q 'Lock\|RLock' "$f"; then
                echo "WARNING: $f has module-level mutables without Lock protection"
                FOUND=1
              fi
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "::warning::Found module-level mutable globals without Lock protection (non-blocking)"
          else
            echo "No unprotected module-level mutables found."
          fi
