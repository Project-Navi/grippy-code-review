name: Release to PyPI

on:
  release:
    types: [published]

concurrency:
  group: grippy-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    uses: Project-Navi/.github/.github/workflows/_build-reusable.yml@83f5a6860e88af77ecebda9d90836c6e7caec159
    with:
      tag_name: ${{ github.event.release.tag_name }}
      package_name: grippy
    permissions:
      contents: write
      id-token: write
      attestations: write

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  attach-assets:
    name: Attach assets to release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom
          path: sbom/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            sbom/sbom.cdx.json
            sbom/sbom.spdx.json
