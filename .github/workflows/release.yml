name: Release to PyPI

on:
  release:
    types: [published]

concurrency:
  group: grippy-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    uses: Project-Navi/.github/.github/workflows/_build-reusable.yml@83f5a6860e88af77ecebda9d90836c6e7caec159
    with:
      tag_name: ${{ github.event.release.tag_name }}
      package_name: grippy
    permissions:
      contents: write
      id-token: write
      attestations: write

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

  attach-assets:
    name: Attach assets to release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom
          path: sbom/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            sbom/sbom.cdx.json
            sbom/sbom.spdx.json
